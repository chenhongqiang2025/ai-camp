<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>AI Camp 2026 · 登记入口</title>
<meta name="description" content="2026 IBM × 大连高新园区 AI 夏令营 · 参与登记入口 · 欢迎学生 · 行业朋友 · 观察者" />
<meta name="theme-color" content="#0b0b0c" />

<script src="./teacher-auth.js" defer></script>
<!-- Fonts via jsdelivr CDN -->
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/ibm-plex-sans@5/400.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/ibm-plex-sans@5/500.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/ibm-plex-sans@5/600.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/ibm-plex-mono@5/400.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/noto-sans-sc@5/400.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/noto-sans-sc@5/500.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/noto-sans-sc@5/600.css">

<style>
  :root {
    --bg-0: #0b0b0c;
    --bg-1: #121214;
    --bg-2: #1a1a1d;
    --bg-3: #24242a;
    --text: #f4f4f4;
    --text-dim: #a8a8b0;
    --text-faint: #6b6b75;
    --accent: #4589ff;
    --accent-2: #78a9ff;
    --accent-soft: rgba(69,137,255,0.16);
    --border: #2a2a30;
    --success: #42be65;
    --danger: #fa4d56;
    --warning: #f1c21b;
    --font-zh: 'IBM Plex Sans', 'Noto Sans SC', system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    --font-mono: 'IBM Plex Mono', ui-monospace, Consolas, monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { min-height: 100%; background: var(--bg-0); color: var(--text); font-family: var(--font-zh); -webkit-font-smoothing: antialiased; }
  body { display: flex; flex-direction: column; min-height: 100vh; position: relative; }

  body::before {
    content: ''; position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(69,137,255,0.045) 1px, transparent 1px),
      linear-gradient(90deg, rgba(69,137,255,0.045) 1px, transparent 1px);
    background-size: 48px 48px; pointer-events: none;
    mask-image: radial-gradient(ellipse at center, black, transparent 70%);
    -webkit-mask-image: radial-gradient(ellipse at center, black, transparent 70%);
  }
  body::after {
    content: ''; position: fixed; top: -200px; right: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, var(--accent-soft), transparent 60%);
    pointer-events: none; filter: blur(40px);
  }

  /* Top bar */
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 22px 36px; position: relative; z-index: 2; }
  .brand { display: flex; align-items: center; gap: 10px; font-family: var(--font-mono); font-size: 13px; color: var(--text-dim); letter-spacing: 0.6px; }
  .brand .dot { width: 9px; height: 9px; background: var(--accent); border-radius: 2px; box-shadow: 0 0 14px var(--accent); }
  .brand b { color: var(--text); font-weight: 600; }
  .topbar a { color: var(--text-faint); font-size: 12px; font-family: var(--font-mono); text-decoration: none; }
  .topbar a:hover { color: var(--accent-2); }

  /* Main card */
  main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 30px 20px 50px; position: relative; z-index: 2; }
  .card {
    width: 100%; max-width: 480px;
    background: linear-gradient(180deg, var(--bg-1), var(--bg-2));
    border: 1px solid var(--border); border-radius: 14px;
    padding: 36px 32px; box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    animation: rise .35s ease-out;
  }
  @keyframes rise { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }
  .card .badge { display: inline-flex; align-items: center; gap: 7px; padding: 4px 11px; background: var(--accent-soft); border: 1px solid rgba(69,137,255,0.3); border-radius: 100px; font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.6px; color: var(--accent-2); margin-bottom: 22px; }
  .card .badge .dot2 { width: 7px; height: 7px; background: var(--accent); border-radius: 50%; animation: pulse 2s infinite; }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(69,137,255,0.6); }
    70% { box-shadow: 0 0 0 9px rgba(69,137,255,0); }
    100% { box-shadow: 0 0 0 0 rgba(69,137,255,0); }
  }
  .card h1 { font-size: 26px; font-weight: 600; line-height: 1.2; margin-bottom: 8px; letter-spacing: -0.5px; }
  .card .desc { color: var(--text-dim); font-size: 13.5px; line-height: 1.65; margin-bottom: 28px; }
  .card .desc b { color: var(--text); font-weight: 500; }

  /* Field */
  .field { margin-bottom: 18px; }
  .field label { display: block; font-size: 12px; color: var(--text-dim); font-weight: 500; margin-bottom: 7px; letter-spacing: 0.2px; }
  .field label .hint { color: var(--text-faint); font-weight: 400; font-size: 11px; margin-left: 6px; }
  .field input, .field select, .field textarea {
    width: 100%; background: var(--bg-3); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 12px 14px; font-family: inherit; font-size: 14px; outline: none;
    transition: border .15s, box-shadow .15s;
  }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(69,137,255,0.15); }
  .field input.uppercase { text-transform: uppercase; font-family: var(--font-mono); letter-spacing: 2px; font-size: 16px; text-align: center; }
  .field textarea { resize: vertical; min-height: 70px; line-height: 1.55; }
  .field .err { color: var(--danger); font-size: 12px; margin-top: 6px; display: none; }
  .field .err.show { display: block; }

  /* Tags input (multi-select for interests) */
  .tags-wrap { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 8px; }
  .tag-chip { padding: 6px 12px; background: var(--bg-3); border: 1px solid var(--border); border-radius: 100px; cursor: pointer; font-size: 12.5px; color: var(--text-dim); user-select: none; transition: all .15s; }
  .tag-chip:hover { color: var(--text); border-color: var(--border); }
  .tag-chip.on { background: var(--accent-soft); border-color: var(--accent); color: var(--accent-2); }

  /* Buttons */
  .btn-row { display: flex; gap: 10px; margin-top: 26px; }
  button.primary, button.secondary { flex: 1; padding: 12px 16px; border-radius: 8px; cursor: pointer; font-family: inherit; font-size: 14px; font-weight: 500; border: 1px solid transparent; transition: all .15s; }
  button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  button.primary:hover { background: var(--accent-2); }
  button.primary:disabled { background: var(--bg-3); color: var(--text-faint); border-color: var(--border); cursor: not-allowed; }
  button.secondary { background: transparent; color: var(--text-dim); border-color: var(--border); }
  button.secondary:hover { color: var(--text); border-color: var(--border); }

  /* Success state */
  .success-state .icon { font-size: 52px; color: var(--success); margin-bottom: 16px; text-align: center; }
  .success-state h2 { font-size: 22px; margin-bottom: 8px; text-align: center; }
  .success-state .me { background: var(--bg-3); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; margin-top: 18px; }
  .success-state .me .row { display: flex; gap: 10px; padding: 5px 0; font-size: 13px; }
  .success-state .me .row .k { color: var(--text-faint); width: 60px; flex-shrink: 0; font-family: var(--font-mono); font-size: 11px; padding-top: 2px; }
  .success-state .me .row .v { color: var(--text); flex: 1; word-break: break-all; }

  /* Footer */
  footer { padding: 18px 30px; text-align: center; font-size: 11.5px; color: var(--text-faint); font-family: var(--font-mono); letter-spacing: 0.3px; position: relative; z-index: 2; }
  footer b { color: var(--text-dim); font-weight: 500; }

  /* Mobile */
  @media (max-width: 540px) {
    .topbar { padding: 16px 18px; }
    .card { padding: 28px 22px; border-radius: 12px; }
    .card h1 { font-size: 22px; }
    main { padding: 20px 14px 36px; }
  }
</style>
</head>
<body>

<header class="topbar">
  <div class="brand">
    <span class="dot"></span>
    <span><b>AI Camp 2026</b> · IBM × 大连高新园区</span>
  </div>
  <a href="./">← 返回主页</a>
</header>

<main>
  <div class="card" id="card">
    <!-- Filled by JS -->
  </div>
</main>

<footer>
  © 2026 陳宏强 Richard Chen · 教学专用 · <b>FNC 大连</b>
</footer>

<script>
/* =================================================================
   AI Camp · 学生入口
   - 30 个预生成访问码 fnc-001 ... fnc-030 + 教师码 teacher-2026
   - 二段表单：码 → 个人信息
   - 数据存 localStorage（零后端）
   - 提交后跳转到课件
   ================================================================= */

const STORE_KEY = 'fnc_camp_student_v1';
const KB_KEY    = 'fnc_camp_kb_v1';   // 本机已提交过的学生集合（用于 RAG 互动）

// Valid codes: 30 student + 1 teacher
const VALID_CODES = (function() {
  const list = ['TEACHER-2026'];
  for (let i = 1; i <= 30; i++) list.push('FNC-' + String(i).padStart(3, '0'));
  return list;
})();

const COLLEGES = [
  '计算机学院', '软件学院', '电子信息学院', '自动化学院',
  '机械学院', '化工学院', '管理学院', '数学学院',
  '物理学院', '生命科学学院', '人文学院', '其他'
];

const INTERESTS = [
  '机器学习', '深度学习', '自然语言处理', '计算机视觉',
  '大模型', 'RAG', '知识图谱', 'Agent / 智能体',
  '推荐系统', '强化学习', '机器人', '语音识别',
  '前端开发', '后端开发', '云计算', '产品设计'
];

const card = document.getElementById('card');

// Stage state
function getSession() { try { return JSON.parse(localStorage.getItem(STORE_KEY) || 'null'); } catch { return null; } }
function setSession(s) { localStorage.setItem(STORE_KEY, JSON.stringify(s)); }
function clearSession() { localStorage.removeItem(STORE_KEY); }

function getKB() { try { return JSON.parse(localStorage.getItem(KB_KEY) || '[]'); } catch { return []; } }
function addToKB(entry) {
  const kb = getKB();
  const idx = kb.findIndex(x => x.code === entry.code && x.name === entry.name);
  if (idx >= 0) kb[idx] = entry; else kb.push(entry);
  localStorage.setItem(KB_KEY, JSON.stringify(kb));
}

function render() {
  // Special teacher-only mode: ?import=1 batch import students from WeChat group
  if (new URLSearchParams(location.search).get('import') === '1') {
    renderImportMode();
    return;
  }

  // First, handle ?seed= param (admin demo data injection)
  const seedParam = new URLSearchParams(location.search).get('seed');
  if (seedParam) {
    try {
      const json = decodeURIComponent(escape(atob(decodeURIComponent(seedParam))));
      const arr = JSON.parse(json);
      if (Array.isArray(arr)) {
        const kb = getKB();
        arr.forEach(e => addToKB(e));
        // Show injection success state
        card.innerHTML = `
          <div class="success-state">
            <div class="icon">⚡</div>
            <h2>已注入 ${arr.length} 条演示数据</h2>
            <p class="desc" style="text-align:center;margin-top:8px;">课件的本机知识库已写入 ${arr.length} 个虚拟学生，<br>可在课件互动章节作为脚本演示数据使用。</p>
            <div class="me">
              ${arr.map(s => `<div class="row"><span class="k">${s.code}</span><span class="v">${escapeText(s.name)} · ${escapeText(s.college)}</span></div>`).join('')}
            </div>
            <div class="btn-row">
              <button class="secondary" onclick="location.href='./'">返回主页</button>
              <button class="primary" onclick="location.href='./slides.html'">进入课件 →</button>
            </div>
          </div>
        `;
        return;
      }
    } catch (e) {
      console.warn('Seed parse failed:', e);
    }
  }

  const s = getSession();
  if (s && s.submitted) renderSuccess(s);
  else if (s && s.code) renderForm(s);
  else renderCode();
}

/* ---------- Stage 1: code entry ---------- */
function renderCode() {
  card.innerHTML = `
    <div class="badge"><span class="dot2"></span>欢迎登记 · 可选</div>
    <h1>AI 夏令营 2026 · 登记入口</h1>
    <p class="desc">请输入讲师发给你的<b>访问码</b>·形如 <code style="background:var(--bg-3);padding:1px 6px;border-radius:3px;font-family:var(--font-mono);">FNC-001</code>·登记<b>非必须</b>·欢迎学生 · 行业朋友 · 观察者。</p>
    <div class="field">
      <label>访问码</label>
      <input id="codeInput" class="uppercase" placeholder="FNC-XXX" autocomplete="off" maxlength="16" />
      <div id="codeErr" class="err">访问码无效。请确认输入正确（不区分大小写）。</div>
    </div>
    <div class="btn-row">
      <button class="primary" id="codeNext">下一步 →</button>
    </div>
  `;
  const input = document.getElementById('codeInput');
  const err = document.getElementById('codeErr');
  const btn = document.getElementById('codeNext');
  input.focus();
  function submit() {
    const code = (input.value || '').trim().toUpperCase();
    if (!code) return;
    if (!VALID_CODES.includes(code)) {
      err.classList.add('show'); input.focus(); return;
    }
    err.classList.remove('show');
    setSession({ code, submitted: false });
    renderForm({ code });
  }
  btn.addEventListener('click', submit);
  input.addEventListener('keydown', (e) => { if (e.key === 'Enter') submit(); });
}

/* ---------- Stage 2: personal info ---------- */
function renderForm(s) {
  const isTeacher = s.code === 'TEACHER-2026';
  card.innerHTML = `
    <div class="badge"><span class="dot2"></span>${isTeacher ? '讲师 · 课前预演' : '已识别 · ' + s.code}</div>
    <h1>${isTeacher ? '讲师 · 课前预演通道' : '简单说说你 · 讲师认识一下'}</h1>
    <p class="desc">${isTeacher ? '以讲师身份完整走一遍学员流程·确认每一步都顺畅·预演数据可用于现场演示兜底。' : '讲师课上<b>可能</b>用你的信息做<b>知识图谱互动</b>演示·也<b>可能</b>用 DEMO 数据。无论用不用·填了讲师能认识你。<span style="color:var(--text-faint);">提交后随时可修改。</span>'}</p>

    <div class="field">
      <label>姓名或昵称 <span class="hint">让大屏图谱叫你什么</span></label>
      <input id="fName" placeholder="例如：张三" value="${escapeAttr(s.name||'')}" maxlength="30" />
    </div>

    <div class="field">
      <label>学院</label>
      <select id="fCollege">
        <option value="">请选择…</option>
        ${COLLEGES.map(c => `<option value="${c}" ${s.college===c?'selected':''}>${c}</option>`).join('')}
      </select>
    </div>

    <div class="field">
      <label>兴趣方向 <span class="hint">选 1-5 项</span></label>
      <div class="tags-wrap" id="fTags">
        ${INTERESTS.map(t => `<span class="tag-chip ${(s.interests||[]).includes(t)?'on':''}" data-t="${t}">${t}</span>`).join('')}
      </div>
    </div>

    <div class="field">
      <label>一句话自我介绍 <span class="hint">选填，会用于 RAG 检索互动</span></label>
      <textarea id="fBio" placeholder="例如：我对大模型在金融场景的落地很感兴趣，希望了解 RAG 的工程实践…">${escapeText(s.bio||'')}</textarea>
    </div>

    <div class="btn-row">
      <button class="secondary" id="fBack">← 上一步</button>
      <button class="primary" id="fSubmit">提交 · 进入课件 →</button>
    </div>
  `;

  // tag toggling
  const tagsEl = document.getElementById('fTags');
  tagsEl.addEventListener('click', (e) => {
    const chip = e.target.closest('.tag-chip');
    if (!chip) return;
    const on = chip.classList.toggle('on');
    if (on) {
      const onCount = tagsEl.querySelectorAll('.tag-chip.on').length;
      if (onCount > 5) { chip.classList.remove('on'); }
    }
  });

  document.getElementById('fBack').addEventListener('click', () => { clearSession(); renderCode(); });
  document.getElementById('fSubmit').addEventListener('click', () => {
    const name = (document.getElementById('fName').value || '').trim();
    const college = document.getElementById('fCollege').value;
    const bio = (document.getElementById('fBio').value || '').trim();
    const interests = Array.from(tagsEl.querySelectorAll('.tag-chip.on')).map(c => c.dataset.t);
    if (!name) { alert('请填写姓名/昵称'); return; }
    if (!college) { alert('请选择学院'); return; }
    if (!interests.length) { alert('请至少选一个兴趣方向'); return; }
    const entry = { code: s.code, name, college, interests, bio, submittedAt: new Date().toISOString(), submitted: true };
    setSession(entry);
    addToKB(entry);
    renderSuccess(entry);
  });
}

/* ---------- Stage 3: success ---------- */
function renderSuccess(s) {
  const isTeacher = s.code === 'TEACHER-2026';
  // Compact JSON of this single student — used by 复制我的信息 button
  const compactJSON = JSON.stringify({
    code: s.code,
    name: s.name,
    college: s.college,
    interests: s.interests || [],
    bio: s.bio || '',
    submittedAt: s.submittedAt
  });

  card.innerHTML = `
    <div class="success-state">
      <div class="icon">✓</div>
      <h2>${isTeacher ? '✓ 讲师预演通过' : '✓ 登记完成 · 感谢参与'}</h2>
      <p class="desc" style="text-align:center;margin-top:8px;">${isTeacher ? '所有流程已跑通·可继续测试课件、KG 图谱、AI 推理助手等下游环节。' : '如果讲师建了课程微信群·<b>可选</b>把「我的信息」复制发到群里·讲师课上可能用你的节点做图谱演示。<br><span style="color:var(--text-faint);">没群或不想发也完全 OK·讲师有 DEMO 数据兜底。</span>'}</p>

      <div class="me">
        <div class="row"><span class="k">CODE</span><span class="v" style="font-family:var(--font-mono);">${s.code}</span></div>
        <div class="row"><span class="k">姓名</span><span class="v">${escapeText(s.name)}</span></div>
        <div class="row"><span class="k">学院</span><span class="v">${escapeText(s.college)}</span></div>
        <div class="row"><span class="k">兴趣</span><span class="v">${(s.interests||[]).map(escapeText).join(' · ')}</span></div>
        ${s.bio ? `<div class="row"><span class="k">简介</span><span class="v">${escapeText(s.bio)}</span></div>` : ''}
      </div>

      ${!isTeacher ? `
      <button id="fCopyInfo" class="primary" style="width:100%;margin-top:14px;padding:12px 16px;font-size:14px;font-weight:500;">📋 复制我的信息（可选 · 发到讲师群）</button>
      <div style="font-size:11.5px;color:var(--text-faint);margin-top:8px;text-align:center;line-height:1.6;">点一下就把你的信息复制到剪贴板。<br>切到微信，长按粘贴到群里即可。</div>
      ` : ''}

      <div class="btn-row" style="margin-top:18px;">
        <button class="secondary" id="fEdit">修改信息</button>
        <button class="primary" id="fGo">进入课件 →</button>
      </div>
    </div>
  `;
  document.getElementById('fEdit').addEventListener('click', () => {
    const ses = getSession();
    if (ses) { ses.submitted = false; setSession(ses); }
    renderForm(s);
  });
  document.getElementById('fGo').addEventListener('click', () => { location.href = './slides.html'; });

  const copyBtn = document.getElementById('fCopyInfo');
  if (copyBtn) {
    copyBtn.addEventListener('click', () => {
      navigator.clipboard.writeText(compactJSON).then(() => {
        copyBtn.textContent = '✓ 已复制 · 切微信粘贴';
        copyBtn.style.background = 'var(--success)';
        copyBtn.style.borderColor = 'var(--success)';
        setTimeout(() => {
          copyBtn.textContent = '📋 复制我的信息（可选 · 发到讲师群）';
          copyBtn.style.background = '';
          copyBtn.style.borderColor = '';
        }, 2500);
      }).catch(() => {
        // Fallback: show in prompt
        prompt('请手动复制下面这行 JSON，粘贴到微信群：', compactJSON);
      });
    });
  }
}

/* ---------- Special: ?import=1 mode (teacher batch import students) ---------- */
function renderImportMode() {
  document.querySelector('.topbar a').textContent = '← 返回主页';
  // Teacher gate: only teachers can see the bulk-import UI
  const isTeacher = window.TeacherAuth && window.TeacherAuth.isTeacher();
  if (!isTeacher) {
    card.innerHTML = `
      <div style="text-align:center; padding: 30px 20px;">
        <div style="font-size:36px; margin-bottom:14px; opacity:0.5;">🔒</div>
        <h2 style="margin:0 0 10px; color:var(--text);">教师内部工具 · 感谢关注</h2>
        <div style="font-family:var(--font-mono); font-size:11px; color:var(--text-faint); letter-spacing:2px; text-transform:uppercase; margin-bottom:16px;">TEACHER-ONLY BULK IMPORT</div>
        <p class="desc" style="max-width:460px; margin: 0 auto 20px;">这是讲师端的批量导入工具·仅面向讲师使用。<br>如果您是学员·请从 <a href="./" style="color:var(--accent-2); text-decoration:none;">主页</a> 或 <a href="./enroll.html" style="color:var(--accent-2); text-decoration:none;">学生入口</a> 报名。</p>
        <button class="btn" onclick="window.TeacherAuth.promptUnlock()" style="padding:8px 18px; background:transparent; border:1px dashed var(--border); color:var(--text-faint); font-family:var(--font-mono); font-size:11px; letter-spacing:0.5px; border-radius:100px; cursor:pointer;">教师? 按 Ctrl+K 或点这里输入访问码</button>
      </div>
    `;
    return;
  }
  card.innerHTML = `
    <div class="badge"><span class="dot2"></span>讲师 · 批量导入</div>
    <h1>📥 批量导入学生数据</h1>
    <p class="desc">把课程微信群里学生粘贴的 <b>JSON 行</b>一次性贴到下面，点"解析 + 导入"。<br>支持：每行一个 JSON 对象、单个 JSON 数组、混合粘贴。</p>

    <div class="field">
      <label>粘贴学生 JSON（一行一个）<span class="hint">从微信群复制即可</span></label>
      <textarea id="impText" placeholder='{"code":"FNC-001","name":"张三","college":"计算机学院","interests":["机器学习","RAG"],"bio":"..."}
{"code":"FNC-002","name":"李四","college":"软件学院","interests":["知识图谱"],"bio":"..."}
{"code":"FNC-003","name":"王五","college":"管理学院","interests":["产品设计","大模型"],"bio":"..."}' style="min-height:180px;font-family:var(--font-mono);font-size:12px;line-height:1.5;"></textarea>
      <div id="impErr" class="err">解析失败 · 检查 JSON 格式</div>
    </div>

    <div class="btn-row">
      <button class="secondary" id="impCancel">取消</button>
      <button class="primary" id="impDo">解析 + 导入</button>
    </div>

    <div id="impResult" style="margin-top:18px;display:none;"></div>

    <div style="margin-top:24px;padding:12px 14px;background:var(--bg-3);border-radius:6px;border-left:3px solid var(--accent);font-size:12px;color:var(--text-dim);line-height:1.7;">
      <b style="color:var(--text);">💡 提示：</b><br>
      · 导入只写入 <b>这台演示机</b>的 localStorage<br>
      · 同 code 的学生会被新数据覆盖（学生修改后重发也 OK）<br>
      · 导入完成后，回到课件 <code>slides.html#/10/3</code>，KG 图谱自动出节点<br>
      · 想清空全部学生：admin → 学生数据 → 清空
    </div>
  `;

  document.getElementById('impCancel').addEventListener('click', () => {
    location.href = './';
  });

  document.getElementById('impDo').addEventListener('click', () => {
    const text = (document.getElementById('impText').value || '').trim();
    const errEl = document.getElementById('impErr');
    const resEl = document.getElementById('impResult');
    errEl.classList.remove('show');
    if (!text) { errEl.textContent = '请先粘贴 JSON 内容'; errEl.classList.add('show'); return; }

    const parsed = parseStudentJSON(text);
    if (!parsed.students.length) {
      errEl.textContent = '没有解析出有效学生（' + parsed.errors.length + ' 行解析失败）';
      errEl.classList.add('show');
      return;
    }

    // Merge to KB — dedup by code+name so shared access codes work
    // (same student re-submitting overwrites; different students on same code coexist)
    const kb = getKB();
    let added = 0, updated = 0;
    parsed.students.forEach(s => {
      const idx = kb.findIndex(x => x.code === s.code && x.name === s.name);
      if (idx >= 0) { kb[idx] = s; updated++; }
      else { kb.push(s); added++; }
    });
    localStorage.setItem(KB_KEY, JSON.stringify(kb));

    resEl.style.display = 'block';
    resEl.innerHTML = `
      <div style="padding:14px 16px;background:rgba(66,190,101,0.1);border:1px solid var(--success);border-radius:8px;color:var(--success);">
        ✓ <b style="color:#fff;">导入完成</b>　·　新增 <b style="color:#fff;">${added}</b> 条　·　更新 <b style="color:#fff;">${updated}</b> 条
        ${parsed.errors.length ? `<br><span style="color:var(--warning);font-size:11px;">⚠ ${parsed.errors.length} 行无法解析已跳过</span>` : ''}
      </div>
      <div class="btn-row" style="margin-top:12px;">
        <button class="secondary" onclick="location.href='./enroll.html?import=1'">继续导入</button>
        <button class="primary" onclick="location.href='./slides.html#/10/3'">查看 KG 图谱 →</button>
      </div>
    `;
  });
}

function parseStudentJSON(text) {
  const students = [];
  const errors = [];

  // Try 1: parse as whole (array or single object)
  try {
    const obj = JSON.parse(text);
    if (Array.isArray(obj)) { obj.forEach(s => students.push(s)); return { students, errors }; }
    if (typeof obj === 'object' && obj !== null && obj.code) { students.push(obj); return { students, errors }; }
  } catch (e) { /* fall through to line-by-line */ }

  // Try 2: line-by-line
  const lines = text.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
  lines.forEach((line, i) => {
    try {
      const obj = JSON.parse(line);
      if (Array.isArray(obj)) obj.forEach(o => o && o.code && students.push(o));
      else if (typeof obj === 'object' && obj && obj.code) students.push(obj);
      else errors.push({ line: i+1, reason: 'no code field' });
    } catch (e) { errors.push({ line: i+1, reason: e.message }); }
  });

  // Validate + normalize
  const valid = students.filter(s => s.code && s.name).map(s => ({
    code: s.code,
    name: s.name,
    college: s.college || '其他',
    interests: Array.isArray(s.interests) ? s.interests : [],
    bio: s.bio || '',
    submittedAt: s.submittedAt || new Date().toISOString(),
    submitted: true
  }));

  return { students: valid, errors };
}

function escapeText(s) { return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escapeAttr(s) { return escapeText(s); }

render();
</script>
