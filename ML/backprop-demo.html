<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>反向传播 · 神经网络如何"学"</title>
<style>
  * { box-sizing: border-box; }
  body { background: #0a0a0c; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif; margin: 0; padding: 24px; }
  h1 { color: #fff; font-size: 22px; margin: 0 0 4px; }
  .sub { color: #888; font-size: 12px; margin-bottom: 22px; font-family: ui-monospace, monospace; letter-spacing: 1.2px; }

  .control { background: #14141a; border: 1px solid #2a2a35; border-radius: 8px; padding: 12px 18px; margin-bottom: 18px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; max-width: 1280px; margin-left: auto; margin-right: auto; font-size: 13px; }
  .control button { background: #1d1d24; color: #fff; border: 1px solid #2a2a35; border-radius: 4px; padding: 7px 13px; font-size: 12.5px; cursor: pointer; font-family: inherit; }
  .control button.primary { background: #4589ff; border-color: #4589ff; font-weight: 500; }
  .control button.primary:hover { background: #6fa7ff; }
  .control button.warn { background: #ffaa00; border-color: #ffaa00; color: #000; }
  .control button:disabled { opacity: 0.45; cursor: not-allowed; }
  .control .gap { flex: 1; }
  .control .meta { font-family: ui-monospace, monospace; font-size: 11px; color: #888; }

  .stage { display: grid; grid-template-columns: 1fr 380px; gap: 16px; max-width: 1280px; margin: 0 auto; }
  .col { background: #14141a; border: 1px solid #2a2a35; border-radius: 8px; padding: 16px 18px; }
  .col h3 { margin: 0 0 12px; font-family: ui-monospace, monospace; font-size: 10.5px; color: #6fa7ff; letter-spacing: 1.5px; text-transform: uppercase; padding-bottom: 8px; border-bottom: 1px solid #2a2a35; }

  .net-svg { width: 100%; height: 380px; display: block; }

  .data-row { display: grid; grid-template-columns: 70px 60px 60px 70px 80px; gap: 8px; padding: 6px 0; font-family: ui-monospace, monospace; font-size: 12px; align-items: center; border-bottom: 1px dashed #1d1d24; }
  .data-row.head { color: #888; font-size: 10.5px; letter-spacing: 1px; text-transform: uppercase; }
  .data-row.cur { background: rgba(255,213,102,0.12); border-radius: 4px; padding-left: 6px; padding-right: 6px; }
  .data-row .truth { color: #6fa7ff; }
  .data-row .pred { color: #ffd566; }
  .data-row .err { color: #ff6f6f; }

  .loss-graph { width: 100%; height: 140px; margin-top: 6px; }

  .phase-indicator { padding: 7px 12px; border-radius: 14px; font-family: ui-monospace, monospace; font-size: 11px; letter-spacing: 1px; background: #1d1d24; color: #aab; }
  .phase-indicator.active { background: #4589ff; color: #fff; }

  .footnote { max-width: 1280px; margin: 18px auto 0; font-size: 11px; color: #555; font-family: ui-monospace, monospace; letter-spacing: 0.5px; text-align: center; }
</style>
</head>
<body>

<h1>反向传播 · 神经网络如何"学"</h1>
<div class="sub">1986 RUMELHART · HINTON · WILLIAMS · NATURE · TASK: LEARN XOR · 2 → 3 → 1 NETWORK</div>

<div class="control">
  <button class="primary" onclick="stepForward()" id="btnFwd">① 前向传播</button>
  <button onclick="stepLoss()" id="btnLoss" disabled>② 算误差</button>
  <button onclick="stepBackward()" id="btnBwd" disabled>③ 反向传播</button>
  <button onclick="stepUpdate()" id="btnUpd" disabled>④ 更新权重</button>
  <span class="gap"></span>
  <button class="warn" onclick="autoTrain()" id="btnAuto">⚡ 自动训练 200 轮</button>
  <button onclick="reset()">↻ 重置</button>
  <span class="meta">迭代 <b id="iterCount" style="color:#fff;">0</b> · 损失 <b id="lossVal" style="color:#ff6f6f;">—</b></span>
</div>

<div class="stage">

  <div class="col">
    <h3>网络结构 · 任务：学会 XOR</h3>
    <svg class="net-svg" id="netSvg" viewBox="0 0 720 380" preserveAspectRatio="xMidYMid meet"></svg>
    <div style="display:flex;gap:8px;margin-top:10px;align-items:center;font-family:ui-monospace,monospace;font-size:11px;">
      <span class="phase-indicator" id="phForward">FORWARD</span>
      <span class="phase-indicator" id="phLoss">LOSS</span>
      <span class="phase-indicator" id="phBackward">BACKWARD</span>
      <span class="phase-indicator" id="phUpdate">UPDATE</span>
    </div>
  </div>

  <div class="col">
    <h3>训练样本 (XOR)</h3>
    <div class="data-row head">
      <span>x₁ x₂</span><span>truth</span><span>pred</span><span>err</span><span></span>
    </div>
    <div id="dataRows"></div>

    <h3 style="margin-top: 18px;">损失曲线</h3>
    <svg class="loss-graph" id="lossGraph" viewBox="0 0 360 140" preserveAspectRatio="none"></svg>
    <div style="font-family:ui-monospace,monospace;font-size:11px;color:#888;margin-top:6px;line-height:1.7;">
      <div>橙色横线 = 完美预测（损失 = 0）</div>
      <div>红线下降 = 网络在"学会"</div>
    </div>
  </div>

</div>

<div class="footnote">
  反向传播 · 梯度下降 + 链式法则 · 1986 年定型 · 今天 LLM 训练，本质还是这四步循环几百万次
</div>

<script>
const $ = id => document.getElementById(id);

// XOR training data
const data = [
  { x: [0, 0], y: 0 },
  { x: [0, 1], y: 1 },
  { x: [1, 0], y: 1 },
  { x: [1, 1], y: 0 }
];

// Network: 2 input - 3 hidden - 1 output, sigmoid activations
let W1, b1, W2, b2; // weights
let iter = 0;
let lossHistory = [];
let phase = 'idle'; // idle / fwd / loss / bwd / upd
let lastFwd = null;
const lr = 1.5;

function sigmoid(z) { return 1/(1+Math.exp(-z)); }
function dsig(a) { return a * (1 - a); }

function initWeights() {
  // Random init (small)
  W1 = [
    [Math.random()*2-1, Math.random()*2-1],
    [Math.random()*2-1, Math.random()*2-1],
    [Math.random()*2-1, Math.random()*2-1]
  ];
  b1 = [Math.random()*0.5, Math.random()*0.5, Math.random()*0.5];
  W2 = [Math.random()*2-1, Math.random()*2-1, Math.random()*2-1];
  b2 = Math.random()*0.5;
}

// Forward for one sample
function forward(x) {
  const h_raw = W1.map((w, i) => w[0]*x[0] + w[1]*x[1] + b1[i]);
  const h = h_raw.map(sigmoid);
  const o_raw = W2[0]*h[0] + W2[1]*h[1] + W2[2]*h[2] + b2;
  const o = sigmoid(o_raw);
  return { h_raw, h, o_raw, o };
}

// Compute loss over all data
function totalLoss() {
  let loss = 0;
  data.forEach(d => {
    const f = forward(d.x);
    loss += 0.5 * (f.o - d.y) ** 2;
  });
  return loss / data.length;
}

function predictAll() {
  return data.map(d => ({ ...d, pred: forward(d.x).o }));
}

// One full backprop step over all samples (batch)
function backpropStep() {
  let dW1 = [[0,0],[0,0],[0,0]], db1 = [0,0,0];
  let dW2 = [0,0,0], db2 = 0;

  data.forEach(d => {
    const f = forward(d.x);
    const err = f.o - d.y;
    const dO = err * dsig(f.o);
    dW2[0] += dO * f.h[0]; dW2[1] += dO * f.h[1]; dW2[2] += dO * f.h[2];
    db2 += dO;
    for (let i = 0; i < 3; i++) {
      const dH = dO * W2[i] * dsig(f.h[i]);
      dW1[i][0] += dH * d.x[0];
      dW1[i][1] += dH * d.x[1];
      db1[i] += dH;
    }
  });

  const n = data.length;
  for (let i = 0; i < 3; i++) {
    W1[i][0] -= lr * dW1[i][0] / n;
    W1[i][1] -= lr * dW1[i][1] / n;
    b1[i] -= lr * db1[i] / n;
    W2[i] -= lr * dW2[i] / n;
  }
  b2 -= lr * db2 / n;
}

function setPhase(p) {
  phase = p;
  ['phForward','phLoss','phBackward','phUpdate'].forEach(id => $(id).classList.remove('active'));
  if (p === 'fwd') $('phForward').classList.add('active');
  if (p === 'loss') $('phLoss').classList.add('active');
  if (p === 'bwd') $('phBackward').classList.add('active');
  if (p === 'upd') $('phUpdate').classList.add('active');
}

function stepForward() {
  setPhase('fwd');
  lastFwd = predictAll();
  $('btnFwd').disabled = true;
  $('btnLoss').disabled = false;
  drawAll();
}

function stepLoss() {
  setPhase('loss');
  $('btnLoss').disabled = true;
  $('btnBwd').disabled = false;
  drawAll();
}

function stepBackward() {
  setPhase('bwd');
  $('btnBwd').disabled = true;
  $('btnUpd').disabled = false;
  drawAll();
}

function stepUpdate() {
  setPhase('upd');
  backpropStep();
  iter++;
  $('iterCount').textContent = iter;
  const l = totalLoss();
  lossHistory.push(l);
  $('lossVal').textContent = l.toFixed(4);
  $('btnUpd').disabled = true;
  $('btnFwd').disabled = false;
  setTimeout(() => { setPhase('idle'); lastFwd = predictAll(); drawAll(); }, 600);
}

function autoTrain() {
  $('btnAuto').disabled = true;
  let i = 0;
  function step() {
    if (i >= 200) {
      $('btnAuto').disabled = false;
      setPhase('idle');
      lastFwd = predictAll();
      drawAll();
      return;
    }
    backpropStep();
    iter++;
    if (i % 5 === 0) {
      lossHistory.push(totalLoss());
      $('iterCount').textContent = iter;
      $('lossVal').textContent = totalLoss().toFixed(4);
      lastFwd = predictAll();
      drawAll();
    }
    i++;
    requestAnimationFrame(step);
  }
  step();
}

function reset() {
  initWeights();
  iter = 0;
  lossHistory = [totalLoss()];
  $('iterCount').textContent = '0';
  $('lossVal').textContent = totalLoss().toFixed(4);
  setPhase('idle');
  lastFwd = predictAll();
  ['btnFwd','btnLoss','btnBwd','btnUpd'].forEach(id => $(id).disabled = false);
  $('btnLoss').disabled = true;
  $('btnBwd').disabled = true;
  $('btnUpd').disabled = true;
  drawAll();
}

function drawAll() {
  drawNet();
  drawDataRows();
  drawLoss();
}

function drawNet() {
  const svg = $('netSvg');
  const inX = 60, hidX = 320, outX = 580;
  const inYs = [130, 250];
  const hidYs = [80, 190, 300];
  const outY = 190;

  const wToColor = w => w >= 0 ? '#4589ff' : '#ff6f6f';
  const wToOpacity = w => 0.3 + Math.min(0.7, Math.abs(w) * 0.35);
  const wToWidth = w => 1 + Math.min(5, Math.abs(w) * 1.8);

  // Direction overlay for phase
  const fwdOverlay = phase === 'fwd';
  const bwdOverlay = phase === 'bwd';

  let html = '';

  // W1 lines (input → hidden)
  for (let i = 0; i < 3; i++) {
    for (let j = 0; j < 2; j++) {
      const w = W1[i][j];
      html += `<line x1="${inX+22}" y1="${inYs[j]}" x2="${hidX-26}" y2="${hidYs[i]}"
        stroke="${wToColor(w)}" stroke-width="${wToWidth(w)}" opacity="${wToOpacity(w)}"
        ${fwdOverlay ? 'stroke-dasharray="6,3" class="animFwd"' : ''}
        ${bwdOverlay ? 'stroke-dasharray="3,6" class="animBwd"' : ''}/>`;
    }
  }

  // W2 lines (hidden → output)
  for (let i = 0; i < 3; i++) {
    const w = W2[i];
    html += `<line x1="${hidX+26}" y1="${hidYs[i]}" x2="${outX-26}" y2="${outY}"
      stroke="${wToColor(w)}" stroke-width="${wToWidth(w)}" opacity="${wToOpacity(w)}"
      ${fwdOverlay ? 'stroke-dasharray="6,3" class="animFwd"' : ''}
      ${bwdOverlay ? 'stroke-dasharray="3,6" class="animBwd"' : ''}/>`;
  }

  // Input nodes
  inYs.forEach((y, i) => {
    html += `<circle cx="${inX}" cy="${y}" r="22" fill="rgba(255,213,102,0.18)" stroke="#ffd566" stroke-width="1.5"/>
      <text x="${inX}" y="${y+5}" text-anchor="middle" fill="#ffd566" font-family="ui-monospace,monospace" font-size="13">x${i+1}</text>`;
  });

  // Hidden nodes
  hidYs.forEach((y, i) => {
    html += `<circle cx="${hidX}" cy="${y}" r="26" fill="rgba(69,137,255,0.18)" stroke="#4589ff" stroke-width="1.5"/>
      <text x="${hidX}" y="${y+5}" text-anchor="middle" fill="#fff" font-family="ui-monospace,monospace" font-size="12">h${i+1}</text>`;
  });

  // Output node
  html += `<circle cx="${outX}" cy="${outY}" r="28" fill="rgba(36,161,72,0.18)" stroke="#24a148" stroke-width="2"/>
    <text x="${outX}" y="${outY+5}" text-anchor="middle" fill="#24a148" font-family="ui-monospace,monospace" font-size="14" font-weight="600">y</text>`;

  // Phase arrow indicator
  if (phase === 'fwd') {
    html += `<text x="360" y="40" text-anchor="middle" fill="#4589ff" font-family="ui-monospace,monospace" font-size="13" font-weight="600">→ FORWARD →</text>`;
  } else if (phase === 'bwd') {
    html += `<text x="360" y="40" text-anchor="middle" fill="#ff6f6f" font-family="ui-monospace,monospace" font-size="13" font-weight="600">← BACKWARD (误差反传) ←</text>`;
  } else if (phase === 'upd') {
    html += `<text x="360" y="40" text-anchor="middle" fill="#ffaa00" font-family="ui-monospace,monospace" font-size="13" font-weight="600">✓ UPDATE WEIGHTS ✓</text>`;
  } else if (phase === 'loss') {
    html += `<text x="360" y="40" text-anchor="middle" fill="#ffd566" font-family="ui-monospace,monospace" font-size="13" font-weight="600">⚠ COMPUTE ERROR ⚠</text>`;
  }

  html += `
    <style>
      .animFwd { animation: dashFwd 0.6s linear infinite; }
      .animBwd { animation: dashBwd 0.6s linear infinite; }
      @keyframes dashFwd { to { stroke-dashoffset: -18; } }
      @keyframes dashBwd { to { stroke-dashoffset: 18; } }
    </style>
  `;

  svg.innerHTML = html;
}

function drawDataRows() {
  const rows = (lastFwd || predictAll()).map((d, i) => {
    const err = d.pred - d.y;
    const isCur = false; // could highlight current sample
    return `
      <div class="data-row${isCur ? ' cur' : ''}">
        <span>${d.x[0]}, ${d.x[1]}</span>
        <span class="truth">${d.y.toFixed(1)}</span>
        <span class="pred">${d.pred.toFixed(2)}</span>
        <span class="err">${err >= 0 ? '+' : ''}${err.toFixed(2)}</span>
        <span style="font-size:10px;color:${Math.abs(err) < 0.1 ? '#24a148' : Math.abs(err) < 0.3 ? '#ffaa00' : '#ff6f6f'};">${Math.abs(err) < 0.1 ? '● 学会了' : Math.abs(err) < 0.3 ? '◐ 接近' : '○ 还在学'}</span>
      </div>
    `;
  }).join('');
  $('dataRows').innerHTML = rows;
}

function drawLoss() {
  const svg = $('lossGraph');
  const W = 360, H = 140, padL = 30, padR = 8, padT = 8, padB = 22;
  const n = lossHistory.length;
  const xMax = Math.max(50, n - 1);
  const yMax = Math.max(0.05, Math.max(...lossHistory));

  const xToPx = i => padL + (n === 1 ? 0 : i / xMax * (W - padL - padR));
  const yToPx = y => H - padB - y / yMax * (H - padT - padB);

  let html = `
    <line x1="${padL}" y1="${H-padB}" x2="${W-padR}" y2="${H-padB}" stroke="#2a2a35" stroke-width="1"/>
    <line x1="${padL}" y1="${padT}" x2="${padL}" y2="${H-padB}" stroke="#2a2a35" stroke-width="1"/>
    <line x1="${padL}" y1="${H-padB}" x2="${W-padR}" y2="${H-padB}" stroke="#ffaa00" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>
    <text x="${padL-4}" y="${padT+10}" text-anchor="end" fill="#555" font-family="ui-monospace,monospace" font-size="9">${yMax.toFixed(2)}</text>
    <text x="${padL-4}" y="${H-padB+4}" text-anchor="end" fill="#555" font-family="ui-monospace,monospace" font-size="9">0</text>
    <text x="${W-padR}" y="${H-2}" text-anchor="end" fill="#555" font-family="ui-monospace,monospace" font-size="9">迭代 ${n-1}</text>
  `;
  if (n >= 2) {
    const pts = lossHistory.map((l, i) => `${xToPx(i).toFixed(1)},${yToPx(l).toFixed(1)}`).join(' ');
    html += `<polyline points="${pts}" fill="none" stroke="#ff6f6f" stroke-width="2"/>`;
    const last = lossHistory[lossHistory.length-1];
    html += `<circle cx="${xToPx(n-1).toFixed(1)}" cy="${yToPx(last).toFixed(1)}" r="4" fill="#ff6f6f" stroke="#fff" stroke-width="1"/>`;
  }
  svg.innerHTML = html;
}

reset();
</script>

</body>
</html>
